<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Nails by Dul - Cotizador</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&family=Lato:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        .font-title { font-family: 'Playfair Display', serif; }
        .font-script { font-family: 'Great Vibes', cursive; }
        .font-body { font-family: 'Lato', sans-serif; }
        .dusty-rose { background-color: #C7747B; }
        .dusty-rose-text { color: #C7747B; }
        .dusty-rose-light { background-color: #FDF5F6; }
        .card-shadow { box-shadow: 0 4px 20px rgba(199, 116, 123, 0.12); }
        .logo-oval { width: 160px; height: 90px; object-fit: cover; border-radius: 100px; border: 1px solid #E5E1D8; display: inline-block; }
        
        .step-indicator.active { background-color: #C7747B; color: white; transform: scale(1.1); }
        .step-indicator.completed { background-color: #4A443F; color: white; }
        
        /* Estilo Botones Tipo Chip (Paso 3) */
        .decoration-chip {
            border: 2px solid #F3F4F6;
            transition: all 0.2s;
            background-color: white;
            color: #4A443F;
        }
        .decoration-chip.selected {
            background-color: #C7747B;
            color: white;
            border-color: #C7747B;
        }

        .btn-option { border: 2px solid #F3F4F6; transition: all 0.2s; text-align: left; }
        .btn-option.selected { border-color: #C7747B; background-color: #FDF5F6; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-full font-body bg-[#F9F7F2] text-[#4A443F]">
    <div id="app" class="h-full overflow-auto pb-10">
        <div class="max-w-xl mx-auto px-4 py-8">
            
            <header class="text-center mb-6 fade-in">
                <img src="logo.png" alt="Logo" class="logo-oval mb-2">
                <h1 class="font-title text-3xl dusty-rose-text font-semibold">Beautiful Nails</h1>
                <p class="font-script text-2xl text-gray-500">by Dul</p>
            </header>

            <div class="flex flex-col items-center mb-8 fade-in">
                <div class="flex justify-center items-center gap-2 mb-4">
                    <div id="step-1" class="step-indicator active w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold transition-all">1</div>
                    <div class="w-6 h-0.5 bg-gray-200"></div>
                    <div id="step-2" class="step-indicator w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold transition-all bg-gray-200">2</div>
                    <div class="w-6 h-0.5 bg-gray-200"></div>
                    <div id="step-3" class="step-indicator w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold transition-all bg-gray-200">3</div>
                    <div class="w-6 h-0.5 bg-gray-200"></div>
                    <div id="step-4" class="step-indicator w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold transition-all bg-gray-200">4</div>
                </div>
                <h2 id="step-instruction" class="font-title text-xl text-center">¿Qué realizaremos hoy?</h2>
                <p id="step-disclaimer" class="text-center text-xs text-gray-400 mt-1 hidden">precio por uña, Puedes escoger más de uno</p>
            </div>

            <section id="section-1" class="fade-in">
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="selectType('Nueva Aplicación')" class="bg-white p-6 rounded-3xl card-shadow flex flex-col items-center gap-3">
                        <div class="w-14 h-14 rounded-full dusty-rose-light flex items-center justify-center text-2xl">✨</div>
                        <span class="font-title text-lg">Nueva</span>
                    </button>
                    <button onclick="selectType('Retoque')" class="bg-white p-6 rounded-3xl card-shadow flex flex-col items-center gap-3">
                        <div class="w-14 h-14 rounded-full dusty-rose-light flex items-center justify-center text-2xl">💅</div>
                        <span class="font-title text-lg">Retoque</span>
                    </button>
                </div>
            </section>

            <section id="section-2" class="hidden fade-in">
                <div class="space-y-6">
                    <div class="bg-white p-5 rounded-3xl card-shadow">
                        <label class="block text-xs uppercase tracking-widest text-gray-400 mb-4 font-bold">Técnica Principal</label>
                        <div class="grid grid-cols-1 gap-2">
                            <button onclick="selectTech(this, 200, 'Tip #2')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Acrílico con Tip #2</span><b>$200</b></button>
                            <button onclick="selectTech(this, 250, 'Escult #2')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Escultural #2</span><b>$250</b></button>
                            <button onclick="selectTech(this, 200, 'Rubber')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Rubber</span><b>$200</b></button>
                            <button onclick="selectTech(this, 150, 'Gel Semipermanente')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Gel Semipermanente</span><b>$150</b></button>
                        </div>
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button onclick="goTo(1)" class="flex-1 py-4 text-gray-500 border border-gray-200 rounded-2xl font-medium">← Volver</button>
                    <button class="flex-1 py-4 bg-gray-100 text-gray-300 rounded-2xl font-bold cursor-not-allowed" disabled>Continuar</button>
                </div>
            </section>

            <section id="section-3" class="hidden fade-in">
                <div class="bg-white p-6 rounded-3xl card-shadow mb-6">
                    <h3 class="font-title text-base dusty-rose-text mb-4">Efectos y Técnicas</h3>
                    <div class="flex flex-wrap gap-2" id="decorations-grid">
                        </div>
                </div>

                <div id="decorations-summary" class="hidden bg-pink-50/50 rounded-2xl p-4 mb-6 border border-pink-100">
                    <h4 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">Diseños seleccionados:</h4>
                    <div id="selected-decorations-list" class="space-y-2"></div>
                </div>

                <div class="flex gap-3">
                    <button onclick="goTo(2)" class="flex-1 py-4 text-gray-500 border border-gray-200 rounded-2xl font-medium">← Volver</button>
                    <button onclick="goTo(4)" class="flex-1 py-4 dusty-rose text-white rounded-2xl font-bold shadow-lg">Continuar →</button>
                </div>
            </section>

            <section id="section-4" class="hidden fade-in">
                <div class="bg-white p-5 rounded-3xl card-shadow mb-6 space-y-3">
                    <label class="group-title block text-xs uppercase text-gray-400 font-bold mb-2">Servicios Adicionales</label>
                    <label class="flex justify-between items-center p-3 border rounded-2xl cursor-pointer">
                        <div class="flex items-center"><input type="checkbox" class="spa-check" value="100" data-name="Mani Rusa" onchange="updateCalculo()"><span class="ml-3 text-sm">Manicura Rusa</span></div><b>$100</b>
                    </label>
                    <label class="flex justify-between items-center p-3 border rounded-2xl cursor-pointer">
                        <div class="flex items-center"><input type="checkbox" class="spa-check" value="250" data-name="Pedicure" onchange="updateCalculo()"><span class="ml-3 text-sm">Pedicure</span></div><b>$250</b>
                    </label>
                </div>
                
                <div class="bg-[#4A443F] text-white p-6 rounded-3xl shadow-xl">
                    <h3 class="font-title text-center text-lg mb-4">Resumen de tu Servicio</h3>
                    <div id="resumen-lista" class="space-y-1 mb-4 text-xs opacity-80"></div>
                    <div class="flex justify-between items-center border-t border-white/10 pt-4">
                        <span class="font-title text-lg">Total Estimado</span>
                        <span id="precio-final" class="text-3xl font-title font-bold text-[#E8C4C7]">$0</span>
                    </div>
                </div>

                <div class="flex gap-3 mt-6">
                    <button onclick="goTo(3)" class="flex-1 py-4 text-gray-500 border border-gray-200 rounded-2xl font-medium">← Volver</button>
                    <button onclick="enviar()" class="flex-[2] py-4 bg-[#25D366] text-white font-bold rounded-2xl shadow-xl">Confirmar WhatsApp</button>
                </div>
            </section>
        </div>
    </div>

    <script>
        const decorationsData = [
            { id: 'espejo', name: 'Espejo', price: 5 }, { id: 'aurora', name: 'Aurora', price: 5 },
            { id: 'perla', name: 'Perla', price: 5 }, { id: 'carey', name: 'Carey', price: 10 },
            { id: 'stickers', name: 'Stickers', price: 5 }, { id: 'french', name: 'French', price: 10 },
            { id: 'cat_eye', name: 'Cat Eye', price: 10 }, { id: 'art_simple', name: 'Nail Art Simple', price: 10 }
        ];

        let cot = { tipo: '', total: 0, items: [], decorations: {} };
        let selectedTechs = [];

        function initDecorations() {
            const grid = document.getElementById('decorations-grid');
            grid.innerHTML = decorationsData.map(d => `
                <button onclick="toggleDecoration('${d.id}', '${d.name}', ${d.price})" 
                        id="dec-${d.id}"
                        class="decoration-chip px-3 py-2 rounded-full text-xs font-medium">
                    ${d.name} <span class="dusty-rose-text">$${d.price}</span>
                </button>
            `).join('');
        }

        function selectType(v) { cot.tipo = v; goTo(2); }
        
        function selectTech(btn, price, name) {
            document.querySelectorAll('.btn-option').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedTechs = [{price, name}];
            updateCalculo();
            setTimeout(() => goTo(3), 400);
        }

        function toggleDecoration(id, name, price) {
            const btn = document.getElementById(`dec-${id}`);
            if (cot.decorations[id]) {
                delete cot.decorations[id];
                btn.classList.remove('selected');
            } else {
                cot.decorations[id] = { name, price, quantity: 1 };
                btn.classList.add('selected');
            }
            updateDecorationsSummary();
            updateCalculo();
        }

        function updateQty(id, delta) {
            if (cot.decorations[id]) {
                cot.decorations[id].quantity = Math.max(1, Math.min(10, cot.decorations[id].quantity + delta));
                updateDecorationsSummary();
                updateCalculo();
            }
        }

        function updateDecorationsSummary() {
            const container = document.getElementById('decorations-summary');
            const list = document.getElementById('selected-decorations-list');
            const ids = Object.keys(cot.decorations);
            if (ids.length === 0) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');
            list.innerHTML = ids.map(id => {
                const d = cot.decorations[id];
                return `<div class="flex items-center justify-between bg-white rounded-xl p-2 shadow-sm">
                    <span class="text-xs font-medium">${d.name}</span>
                    <div class="flex items-center gap-2">
                        <button onclick="updateQty('${id}', -1)" class="w-5 h-5 rounded-full bg-gray-100 text-xs">-</button>
                        <span class="text-xs w-4 text-center">${d.quantity}</span>
                        <button onclick="updateQty('${id}', 1)" class="w-5 h-5 rounded-full bg-gray-100 text-xs">+</button>
                        <b class="text-xs dusty-rose-text ml-1">$${d.price * d.quantity}</b>
                    </div>
                </div>`;
            }).join('');
        }

        function goTo(s) {
            document.querySelectorAll('section').forEach(sec => sec.classList.add('hidden'));
            document.getElementById(`section-${s}`).classList.remove('hidden');
            
            // Textos dinámicos
            const instruction = document.getElementById('step-instruction');
            const disclaimer = document.getElementById('step-disclaimer');
            
            if(s === 1) instruction.innerText = "¿Qué realizaremos hoy?";
            if(s === 2) instruction.innerText = "Selecciona la Técnica";
            if(s === 3) {
                instruction.innerText = "Selecciona tus diseños";
                disclaimer.classList.remove('hidden');
            } else {
                disclaimer.classList.add('hidden');
            }
            if(s === 4) instruction.innerText = "Resumen y Adicionales";

            document.querySelectorAll('.step-indicator').forEach((si, i) => {
                si.classList.toggle('active', i+1 === s);
                si.classList.toggle('completed', i+1 < s);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateCalculo() {
            let total = 0; let items = [cot.tipo];
            selectedTechs.forEach(s => { total += s.price; items.push(s.name); });
            Object.values(cot.decorations).forEach(d => {
                total += (d.price * d.quantity);
                items.push(`${d.name} x${d.quantity}`);
            });
            document.querySelectorAll('.spa-check:checked').forEach(c => {
                total += parseInt(c.value); items.push(c.dataset.name);
            });
            document.getElementById('precio-final').innerText = `$${total}`;
            document.getElementById('resumen-lista').innerHTML = items.map(i => `<div>• ${i}</div>`).join('');
            cot.total = total; cot.items = items;
        }

        function enviar() {
            const t = encodeURIComponent("¡Hola Dulce! Mi cotización: " + cot.items.join(", ") + ". Total: $" + cot.total);
            window.open(`https://wa.me/5215521969219?text=${t}`, "_blank");
        }

        initDecorations();
    </script>
</body>
</html>
