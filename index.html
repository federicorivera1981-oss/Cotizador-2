<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador - Dulce Nails</title>
    <style>
        :root {
            --rosa-suave: #fce4ec;
            --rosa-fuerte: #f06292;
            --dorado: #d4af37;
            --texto: #4a4a4a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--rosa-suave);
            color: var(--texto);
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .logo {
            max-width: 150px;
            margin-bottom: 20px;
            border-radius: 50%;
        }
        h2 { color: var(--rosa-fuerte); margin-bottom: 5px; }
        p.subtitle { font-size: 0.9em; margin-bottom: 25px; color: #888; }
        
        .service-group {
            text-align: left;
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--rosa-fuerte);
        }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background-color: #fafafa;
        }
        .total-box {
            margin-top: 30px;
            padding: 20px;
            background: var(--rosa-suave);
            border-radius: 15px;
            border: 2px dashed var(--rosa-fuerte);
        }
        .total-amount {
            font-size: 2em;
            font-weight: bold;
            color: var(--rosa-fuerte);
        }
        .btn-whatsapp {
            display: block;
            margin-top: 20px;
            background-color: #25d366;
            color: white;
            padding: 15px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://drive.google.com/file/d/1Jx37lUfClO2FpBWrHOYJg63HRfgrLeh7/view?usp=sharing" alt="Logo Dulce Nails" class="logo">
    <h2>Cotizador de Servicios</h2>
    <p class="subtitle">Selecciona tus servicios favoritos</p>

    <div class="service-group">
        <label>Base y Esmaltado</label>
        <select id="base" onchange="calcular()">
            <option value="0" data-desc="Ninguno">Selecciona uno...</option>
            <option value="200" data-desc="Aplicación Rubber">Aplicación Rubber - $200</option>
            <option value="200" data-desc="Calcio Cristal">Calcio Cristal - $200</option>
            <option value="150" data-desc="Gel Semipermanente">Gel Semipermanente - $150</option>
        </select>
    </div>

    <div class="service-group">
        <label>Extensiones (Acrílico)</label>
        <select id="acrilico" onchange="calcular()">
            <option value="0" data-desc="Ninguno">Sin extensiones</option>
            <option value="200" data-desc="Acrílico Tip #2">Acrílico Tip (Hasta #2) - $200</option>
            <option value="250" data-desc="Acrílico Escultural #2">Acrílico Escultural (Hasta #2) - $250</option>
            <option value="250" data-desc="Acrílico Tip #3">Acrílico Tip (#3) - $250</option>
            <option value="300" data-desc="Acrílico Escultural #3">Acrílico Escultural (#3) - $300</option>
        </select>
    </div>

    <div class="service-group">
        <label>Complementos y Spa</label>
        <select id="spa" onchange="calcular()">
            <option value="0" data-desc="Ninguno">Sin complementos</option>
            <option value="100" data-desc="Manicura Rusa">Manicura Rusa - $100</option>
            <option value="250" data-desc="Spa Manicure">Spa Manicure - $250</option>
            <option value="100" data-desc="Diseño Sencillo">Diseño Sencillo - $100</option>
            <option value="100" data-desc="Retiro">Retiro - $100</option>
        </select>
    </div>

    <div class="service-group">
        <label>Pies</label>
        <select id="pies" onchange="calcular()">
            <option value="0" data-desc="Ninguno">Sin servicio de pies</option>
            <option value="150" data-desc="Gel en pies">Gel en pies - $150</option>
            <option value="250" data-desc="Pedicure">Pedicure - $250</option>
            <option value="400" data-desc="Spa Pedicure">Spa Pedicure - $400</option>
        </select>
    </div>

    <div class="total-box">
        <div>Total Estimado:</div>
        <div class="total-amount" id="total">$0.00</div>
    </div>

    <a href="#" id="btnWsp" class="btn-whatsapp" target="_blank">Agendar por WhatsApp</a>
</div>

<script>
    function calcular() {
        const selects = ['base', 'acrilico', 'spa', 'pies'];
        let total = 0;
        let resumen = "Hola Dulce, me interesa: ";

        selects.forEach(id => {
            const el = document.getElementById(id);
            const precio = parseInt(el.value);
            const texto = el.options[el.selectedIndex].getAttribute('data-desc');
            
            total += precio;
            if (precio > 0) resumen += texto + ", ";
        });

        document.getElementById('total').innerText = "$" + total + ".00";
        
        // Configura el botón de WhatsApp
        const mensaje = encodeURIComponent(resumen + "Total: $" + total);
        document.getElementById('btnWsp').href = "https://wa.me/5521969219?text=" + mensaje; 
        // Cambia las X por el número de Dulce
    }
</script>

</body>
</html>
